<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NutriCheck | Quản lý món ăn</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

    <div class="container">

        <a class="navbar-brand fw-bold" href="index.html">

            <i class="bi bi-heart-pulse-fill"></i>

            NutriCheck

        </a>

        <button class="navbar-toggler"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">

                    <a class="nav-link"
                       href="index.html">

                        Trang chủ

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="calculator.html">

                        Tính toán

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link active"
                       href="food.html">

                        Món ăn

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="history.html">

                        Lịch sử

                    </a>

                </li>

                <li class="nav-item">

                    <a class="nav-link"
                       href="login.html">

                        Đăng nhập

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= HEADER ================= -->

<section class="py-5 bg-light">

    <div class="container">

        <div class="row align-items-center">

            <div class="col-lg-8">

                <h1 class="fw-bold text-success">

                    Quản lý món ăn

                </h1>

                <p class="lead">

                    Thêm, sửa, xóa và theo dõi lượng dinh dưỡng
                    của từng món ăn mỗi ngày.

                </p>

            </div>

            <div class="col-lg-4 text-center">

                <i class="bi bi-egg-fried display-1 text-success"></i>

            </div>

        </div>

    </div>

</section>

<!-- ================= FORM THÊM MÓN ĂN ================= -->

<section class="py-5">

<div class="container">

<div class="card shadow border-0">

<div class="card-header bg-success text-white">

<h4 class="mb-0">

<i class="bi bi-plus-circle"></i>

Thêm món ăn

</h4>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-4 mb-3">

<label class="form-label">

Tên món ăn

</label>

<input
type="text"
id="food"
class="form-control"
placeholder="Ví dụ: Cơm gà">

</div>

<div class="col-md-2 mb-3">

<label class="form-label">

Calories

</label>

<input
type="number"
id="calories"
class="form-control">

</div>
<div class="col-md-2 mb-3">

    <label class="form-label">

        Protein (g)

    </label>

    <input
    type="number"
    id="protein"
    class="form-control">

</div>

<div class="col-md-2 mb-3">

    <label class="form-label">

        Carb (g)

    </label>

    <input
    type="number"
    id="carb"
    class="form-control">

</div>

<div class="col-md-2 mb-3">

    <label class="form-label">

        Fat (g)

    </label>

    <input
    type="number"
    id="fat"
    class="form-control">

</div>

</div>

<hr>

<div class="d-flex flex-wrap gap-2">

    <button
    class="btn btn-success"
    onclick="addMeal()">

        <i class="bi bi-plus-circle"></i>

        Thêm món

    </button>

    <button
    class="btn btn-warning"
    onclick="clearMealForm()">

        <i class="bi bi-arrow-clockwise"></i>

        Làm mới

    </button>

    <button
    class="btn btn-danger"
    onclick="clearAllMeals()">

        <i class="bi bi-trash"></i>

        Xóa tất cả

    </button>

    <button
    class="btn btn-primary"
    onclick="exportJSON()">

        <i class="bi bi-download"></i>

        Xuất JSON

    </button>

    <label class="btn btn-info text-white mb-0">

        <i class="bi bi-upload"></i>

        Nhập JSON

        <input
        type="file"
        accept=".json"
        onchange="importJSON(event)"
        hidden>

    </label>

</div>

</div>

</div>

</div>

</section>

<!-- ================= TÌM KIẾM ================= -->

<section class="pb-4">

<div class="container">

<div class="card shadow border-0">

<div class="card-body">

<div class="row">

<div class="col-lg-5">

<input
type="text"
id="searchFood"
class="form-control"
placeholder="🔍 Tìm tên món ăn..."
onkeyup="searchMeal()">

</div>

<div class="col-lg-3">

<input
type="number"
id="filterCalories"
class="form-control"
placeholder="Calories tối thiểu">

</div>

<div class="col-lg-4 d-grid">

<button
class="btn btn-outline-success"
onclick="filterCalories()">

<i class="bi bi-funnel"></i>

Lọc Calories

</button>

</div>

</div>

<br>

<div class="d-flex gap-2 flex-wrap">

<button
class="btn btn-secondary"
onclick="sortMeal()">

<i class="bi bi-sort-numeric-down"></i>

Sắp xếp Calories

</button>

<button
class="btn btn-dark"
onclick="refreshAll()">

<i class="bi bi-arrow-repeat"></i>

Hiển thị tất cả

</button>

</div>

</div>

</div>

</div>

</section>
<!-- ================= DANH SÁCH MÓN ĂN ================= -->

<section class="pb-5">

<div class="container">

<div class="card shadow border-0">

<div class="card-header bg-success text-white">

<h4 class="mb-0">

<i class="bi bi-table"></i>

Danh sách món ăn

</h4>

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle text-center">

<thead class="table-success">

<tr>

<th width="60">STT</th>

<th>Tên món ăn</th>

<th>Calories</th>

<th>Protein</th>

<th>Carb</th>

<th>Fat</th>

<th width="220">Thao tác</th>

</tr>

</thead>

<tbody id="mealTable">

<!-- Dữ liệu sẽ được thêm bằng JavaScript -->

</tbody>

</table>

</div>

</div>

</div>

</div>

</section>

<!-- ================= THỐNG KÊ DINH DƯỠNG ================= -->

<section class="pb-5">

<div class="container">

<div class="row g-4">

<div class="col-lg-3">

<div class="card shadow border-0 text-center">

<div class="card-body">

<h6 class="text-muted">

Tổng Calories

</h6>

<h2
class="text-danger fw-bold"
id="totalCalories">

0

</h2>

</div>

</div>

</div>

<div class="col-lg-3">

<div class="card shadow border-0 text-center">

<div class="card-body">

<h6 class="text-muted">

Protein

</h6>

<h2
class="text-success fw-bold"
id="totalProtein">

0

</h2>

</div>

</div>

</div>

<div class="col-lg-3">

<div class="card shadow border-0 text-center">

<div class="card-body">

<h6 class="text-muted">

Carb

</h6>

<h2
class="text-warning fw-bold"
id="totalCarb">

0

</h2>

</div>

</div>

</div>

<div class="col-lg-3">

<div class="card shadow border-0 text-center">

<div class="card-body">

<h6 class="text-muted">

Fat

</h6>

<h2
class="text-primary fw-bold"
id="totalFat">

0

</h2>

</div>

</div>

</div>

</div>

</div>

</section>
